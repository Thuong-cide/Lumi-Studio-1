# nginx/lumi.conf
# Copy file này vào /etc/nginx/sites-available/lumi
# rồi chạy: sudo ln -s /etc/nginx/sites-available/lumi /etc/nginx/sites-enabled/lumi

upstream lumi_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # thay bằng domain hoặc IP thực của máy

    # Bật gzip cho text response
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        image/svg+xml;

    # Serve React build tĩnh — không qua Node.js
    root  /home/ubuntu/lumi-studio/artifacts/lumiere/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets 30 ngày
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API — forward sang PM2 workers
    location /api/ {
        proxy_pass         http://lumi_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Drive proxy — cache ảnh 1 ngày tại Nginx
    location /api/drive/proxy/ {
        proxy_pass        http://lumi_api;
        proxy_cache_valid 200 1d;
        add_header        Cache-Control "public, max-age=86400";
        add_header        X-Cache-Status $upstream_cache_status;
    }
}
